                          <th style={{ textAlign: "right" }}>CTR</th>
                          <th style={{ textAlign: "right" }}>Конверсии</th>
                          <th style={{ textAlign: "right" }}>CPA</th>
                        </tr>
                      </thead>
                      <tbody>
                        {googleAdsData.map((ad, i) => (
                          <tr key={i}>
                            <td style={{ fontWeight: 500 }}>{ad.campaign}</td>
                            <td style={{ textAlign: "right", color: "#d1d5db" }}>{formatMoney(ad.spend)}</td>
                            <td style={{ textAlign: "right", color: "#d1d5db" }}>{ad.clicks.toLocaleString()}</td>
                            <td style={{ textAlign: "right", color: "#22d3ee" }}>{((ad.conversions / ad.clicks) * 100).toFixed(1)}%</td>
                            <td style={{ textAlign: "right", color: "#34d399" }}>{ad.conversions}</td>
                            <td style={{ textAlign: "right", color: "#fbbf24" }}>{formatMoney(ad.cpa)}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </Card>
                </>
              )}

              {/* === TASKS === */}
              {activeTab === "tasks" && (
                <>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 16 }}>
                    <MetricCard icon="alert-triangle" label="Высокий приоритет" value={asanaTasks.filter(t => t.priority === "high").length} color="rgba(239,68,68,0.3)" />
                    <MetricCard icon="clock" label="Средний приоритет" value={asanaTasks.filter(t => t.priority === "medium").length} color="rgba(245,158,11,0.3)" />
                    <MetricCard icon="check-circle" label="Низкий приоритет" value={asanaTasks.filter(t => t.priority === "low").length} color="rgba(16,185,129,0.3)" />
                  </div>

                  <Card>
                    <SectionHeader icon="check-circle" title="Задачи из Asana" subtitle="Все активные задачи" />
                    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                      {asanaTasks.map((task, i) => (
                        <div key={i} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: 16, background: "rgba(55,65,81,0.5)", borderRadius: 8, cursor: "pointer" }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                            <div style={{
                              width: 12, height: 12, borderRadius: "50%",
                              background: task.priority === "high" ? "#f87171" : task.priority === "medium" ? "#fbbf24" : "#34d399"
                            }} />
                            <div>
                              <p style={{ fontSize: 14, fontWeight: 500 }}>{task.name}</p>
                              <p style={{ fontSize: 12, color: "#9ca3af" }}>{task.project} · {task.assignee}</p>
                            </div>
                          </div>
                          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                            <span style={{ fontSize: 14, color: "#9ca3af" }}>{task.due}</span>
                            <StatusBadge status={task.priority} />
                          </div>
                        </div>
                      ))}
                    </div>
                  </Card>
                </>
              )}

            </div>
          </main>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById("root"));
  </script>
</body>
</html>
